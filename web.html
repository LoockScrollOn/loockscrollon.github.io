<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lazarus Glass - Rastreo GPS</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 0; }
        #map { height: 80vh; width: 100%; }
        h1 { background: #333; color: white; padding: 10px; margin: 0; }
    </style>
</head>
<body>

    <h1>Ubicación Lazarus Glass</h1>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // CONFIGURACIÓN: Reemplacen con el config de su App Web de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSy...SU_API_KEY_WEB_AQUI...",
            authDomain: "lazarus-glass-4194d.firebaseapp.com",
            databaseURL: "https://lazarus-glass-4194d-default-rtdb.firebaseio.com",
            projectId: "lazarus-glass-4194d",
            storageBucket: "lazarus-glass-4194d.appspot.com",
            messagingSenderId: "1025256803263",
            appId: "1:1025256803263:web:XXXXXXXXXXXXXXX"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Inicializar Mapa centrado en México
        const map = L.map('map').setView([21.1213, -101.6826], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        let marker = L.marker([21.1213, -101.6826]).addTo(map);

        // Escuchar cambios en Firebase en tiempo real
        const locationRef = ref(db, 'ubicacion');
        onValue(locationRef, (snapshot) => {
            const data = snapshot.val();
            if (data && data.lat && data.lng) {
                console.log("Nueva ubicación:", data);
                const newLatLng = new L.LatLng(data.lat, data.lng);
                marker.setLatLng(newLatLng);
                map.panTo(newLatLng);
            }
        });
    </script>
</body>
</html>
